<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Mystique</title>
</head>

<body>
    <main>
        <div class="borderdesign">
            <img src="img/Left Border.svg" alt="border-design">
            <img src="img/Right Border.svg" alt="border-design">
        </div>

        <section id="card-info" class="infopage">

            <h1>Mystique</h1>

            <img class="card-holder" src="img/Cards/the-moon.svg" alt="The Moon">

            <!-- The Upright/Reverse Tab -->

            <div class="tab">
                <button class="tablinks" onclick="openTab(event, 'upright')">Up-right</button>
                <button class="tablinks" onclick="openTab(event, 'reverse')">Reverse</button>
            </div>

            <div id="upright" class="tabcontent">
                <p>
                <ul>
                    <li>b</li>
                    <li>a</li>
                    <li>a</li>
                </ul>
                </p>
            </div>

            <div id="reverse" class="tabcontent" style="display: none;">
                <p>
                <ul>
                    <li>a</li>
                    <li>a</li>
                    <li>a</li>
                </ul>
                </p>
            </div>



        </section>
    </main>
</body>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>

</html>
